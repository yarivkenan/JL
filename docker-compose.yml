services:

  # ---------------------------------------------------------------------------
  # Redpanda — Kafka-compatible broker (single-node, no ZooKeeper)
  # ---------------------------------------------------------------------------
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.1
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr=internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr=redpanda:33145
      - --advertise-rpc-addr=redpanda:33145
    ports:
      - "19092:19092"   # Kafka API (host access)
      - "18082:18082"   # Pandaproxy REST
      - "18081:18081"   # Schema Registry
      - "9644:9644"     # Admin API
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info", "--brokers=localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # Redpanda Console — web UI for inspecting topics and messages
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.7.2
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8080:8080"

  # Topic initialiser — creates the otel.metrics topic before the ingest
  # server starts, so the producer never hits a "topic does not exist" error.
  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.1
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        rpk topic create otel.metrics \
          --brokers redpanda:9092 \
          --partitions 3 \
          --replicas 1 || true
    restart: "no"

  # ---------------------------------------------------------------------------
  # Ingest service
  # ---------------------------------------------------------------------------
  ingest:
    build:
      context: .
      dockerfile: ingest/Dockerfile
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
    environment:
      SERVER_ADDR: ":4317"
      KAFKA_BROKERS: "redpanda:9092"
      KAFKA_TOPIC: "otel.metrics"
    ports:
      - "4317:4317"
    restart: unless-stopped

volumes:
  redpanda-data:
