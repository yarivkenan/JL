services:

  # ---------------------------------------------------------------------------
  # API Gateway — single public entry point, routes to ingest / query
  # ---------------------------------------------------------------------------
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    depends_on:
      ingest:
        condition: service_started
      query:
        condition: service_started
    environment:
      GATEWAY_ADDR: ":8080"
      INGEST_URL: "http://ingest:4317"
      QUERY_URL: "http://query:8081"
    ports:
      - "8080:8080"
    networks:
      - public
      - internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redpanda — Kafka-compatible broker (single-node, no ZooKeeper)
  # ---------------------------------------------------------------------------
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.1
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr=internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr=redpanda:33145
      - --advertise-rpc-addr=redpanda:33145
    ports:
      - "19092:19092"   # Kafka API (host access for local dev)
      - "18082:18082"   # Pandaproxy REST
      - "18081:18081"   # Schema Registry
      - "9644:9644"     # Admin API
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info", "--brokers=localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # Topic initialiser — creates the otel.metrics topic before the ingest
  # server starts, so the producer never hits a "topic does not exist" error.
  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.1
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        rpk topic create otel.metrics \
          --brokers redpanda:9092 \
          --partitions 3 \
          --replicas 1 || true && \
        rpk topic create otel.rule-checks \
          --brokers redpanda:9092 \
          --partitions 3 \
          --replicas 1 || true
    networks:
      - internal
    restart: "no"

  # ---------------------------------------------------------------------------
  # Ingest service (internal only — accessed via gateway)
  # ---------------------------------------------------------------------------
  ingest:
    build:
      context: .
      dockerfile: ingest/Dockerfile
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
    environment:
      SERVER_ADDR: ":4317"
      KAFKA_BROKERS: "redpanda:9092"
      KAFKA_TOPIC: "otel.metrics"
    networks:
      - internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Storage consumer — reads from Kafka, persists to TimescaleDB (no public API)
  # ---------------------------------------------------------------------------
  consumer:
    build:
      context: .
      dockerfile: storage/Dockerfile
      args:
        CMD: consumer
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: "redpanda:9092"
      KAFKA_TOPIC: "otel.metrics"
      CONSUMER_GROUP: "storage-consumers"
      MAX_RETRIES: "3"
      DATABASE_URL: "postgres://otel:otel@db:5432/otel_metrics"
    networks:
      - internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Query API (internal only — accessed via gateway)
  # ---------------------------------------------------------------------------
  query:
    build:
      context: .
      dockerfile: storage/Dockerfile
      args:
        CMD: query
    depends_on:
      db:
        condition: service_healthy
    environment:
      QUERY_ADDR: ":8081"
      DATABASE_URL: "postgres://otel:otel@db:5432/otel_metrics"
    networks:
      - internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Rules engine — cron scheduler + evaluator consumer
  # ---------------------------------------------------------------------------
  rules:
    build:
      context: .
      dockerfile: alerting/Dockerfile
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      query:
        condition: service_started
    environment:
      KAFKA_BROKERS: "redpanda:9092"
      RULES_CHECKS_TOPIC: "otel.rule-checks"
      RULES_CONSUMER_GROUP: "rules-engine"
      DATABASE_URL: "postgres://otel:otel@db:5432/otel_metrics"
      QUERY_SERVICE_URL: "http://query:8081"
      RULES_FILE: "/etc/rules/rules.json"
      RULES_INTERVAL: "30s"
    volumes:
      - ./configs/rules.json:/etc/rules/rules.json:ro
    networks:
      - internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # TimescaleDB — metrics storage
  # ---------------------------------------------------------------------------
  db:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_USER: otel
      POSTGRES_PASSWORD: otel
      POSTGRES_DB: otel_metrics
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/home/postgres/pgdata/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otel -d otel_metrics"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  public:
    driver: bridge
  internal:
    driver: bridge

volumes:
  redpanda-data:
  timescale_data:
