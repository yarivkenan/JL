name: Ingest E2E

on:
  push:
    branches: [main, worktree-ingest]
    paths: [ingest/**]
  pull_request:
    branches: [main]
    paths: [ingest/**]

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ingest/go.mod
          cache-dependency-path: ingest/go.sum

      - name: Run e2e tests
        working-directory: ingest
        run: make e2e
