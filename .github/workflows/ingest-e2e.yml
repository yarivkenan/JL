name: Ingest E2E

on:
  pull_request:
    paths: [ingest/**]

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run e2e tests
        run: make e2e
